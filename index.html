<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TPCrew Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;width:100%;padding:40px 20px;text-align:center}
.logo{font-size:42px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#f0b90b,#f5d565);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#64748b;font-size:15px;margin-bottom:48px}
.tools{display:flex;flex-direction:column;gap:16px}
a.tool{display:flex;align-items:center;gap:16px;padding:20px 24px;background:#131a2b;border:1px solid #1e293b;border-radius:14px;text-decoration:none;color:#e2e8f0;transition:all .2s}
a.tool:hover{border-color:#f0b90b;background:#1a2236;transform:translateY(-2px)}
.tool-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.tool-icon.cc{background:rgba(59,130,246,.15);color:#60a5fa}
.tool-icon.tl{background:rgba(34,197,94,.15);color:#4ade80}
.tool-info{text-align:left;flex:1}
.tool-name{font-size:17px;font-weight:600;margin-bottom:4px}
.tool-desc{font-size:13px;color:#64748b}
.tool-arrow{color:#334155;font-size:18px;font-weight:300;transition:transform .2s,color .2s}
a.tool:hover .tool-arrow{color:#f0b90b;transform:translateX(4px)}
.footer{margin-top:48px;color:#334155;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="logo">TPCrew Tools</div>
<div class="subtitle">Internal tools &amp; dashboards</div>
<div class="tools">

<a class="tool" href="tpcrew-command-center.html">
<div class="tool-icon cc">&#9881;</div>
<div class="tool-info">
<div class="tool-name">Command Center</div>
<div class="tool-desc">Dashboard zespolu &mdash; onboarding, konsultacje, asystenci</div>
</div>
<div class="tool-arrow">&rarr;</div>
</a>

<a class="tool" href="timeline-2-0.html">
<div class="tool-icon tl">&#128197;</div>
<div class="tool-info">
<div class="tool-name">Timeline 2.0</div>
<div class="tool-desc">LEG #2 HARD ONBOARD &mdash; cykl 90 dni, WEEK 1-5, enrollerzy</div>
</div>
<div class="tool-arrow">&rarr;</div>
</a>

</div>
<div class="footer">Take Profit Crew &copy; 2026</div>
</div>
</body>
</html>
